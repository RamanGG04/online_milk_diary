{% extends 'base.html' %}
{% block title %}Update Payment{% endblock %}
{% block content %}
<h2 class="page-header">Update Payment — {{ payment.farmer.name }} ({{ payment.month|date:"M Y" }})</h2>
<div class="card p-3 mb-3"><p><strong>Net Payable:</strong> ₹{{ payment.net_amount }}</p></div>
<div class="card p-4" style="max-width: 500px;">
    <form method="post">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary">Save</button></form>
</div>
{% endblock %}
